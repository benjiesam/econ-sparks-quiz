<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Econ Sparks – Allocation of Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #181c27; --card: #1e2336; --border: #2e3451;
    --accent: #60b4f0; --accent-dim: rgba(96,180,240,0.12);
    --text: #e8eaf2; --muted: #8b90a8;
    --green: #3ecf8e; --green-dim: rgba(62,207,142,0.12);
    --red: #f06060; --red-dim: rgba(240,96,96,0.12);
    --radius: 14px;
  }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px 64px; }
  header { text-align: center; margin-bottom: 40px; }
  .tag { display: inline-block; background: var(--accent-dim); color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; border: 1px solid rgba(96,180,240,0.25); }
  h1 { font-family: "Playfair Display", serif; font-size: clamp(24px, 5vw, 38px); color: var(--text); line-height: 1.2; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 15px; font-weight: 300; }
  .progress-wrap { width: 100%; max-width: 680px; margin-bottom: 28px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 36px 28px; width: 100%; max-width: 680px; margin-bottom: 20px; }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .q-num { background: var(--accent); color: #0d1e2e; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; }
  .q-year { color: var(--muted); font-size: 12px; }
  .q-text { font-size: 16px; line-height: 1.65; color: var(--text); margin-bottom: 26px; font-weight: 400; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.18s ease; text-align: left; width: 100%; font-family: "DM Sans", sans-serif; color: var(--text); font-size: 15px; line-height: 1.5; }
  .option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .option-letter { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--muted); transition: all 0.18s ease; margin-top: 1px; }
  .option.correct { border-color: var(--green); background: var(--green-dim); }
  .option.correct .option-letter { background: var(--green); color: #0d2e1e; }
  .option.wrong { border-color: var(--red); background: var(--red-dim); }
  .option.wrong .option-letter { background: var(--red); color: #2e0d0d; }
  .option:disabled { cursor: default; }
  .feedback { margin-top: 18px; padding: 14px 18px; border-radius: 10px; font-size: 14px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--green-dim); border: 1px solid rgba(62,207,142,0.3); color: var(--green); }
  .feedback.wrong-fb { background: var(--red-dim); border: 1px solid rgba(240,96,96,0.3); color: #f09090; }
  .nav { display: flex; gap: 12px; width: 100%; max-width: 680px; justify-content: space-between; align-items: center; }
  .btn { padding: 12px 28px; border-radius: 10px; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s ease; }
  .btn-primary { background: var(--accent); color: #0d1e2e; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .score-screen { text-align: center; width: 100%; max-width: 680px; display: none; }
  .score-screen.show { display: block; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 28px; }
  .score-number { font-family: "Playfair Display", serif; font-size: 42px; color: var(--accent); line-height: 1; }
  .score-total { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .score-title { font-family: "Playfair Display", serif; font-size: 28px; margin-bottom: 10px; }
  .score-msg { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
  .review-list { text-align: left; margin-bottom: 32px; }
  .review-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; background: var(--card); border: 1px solid var(--border); }
  .dot { width: 10px; height: 10px; border-radius: 50%; min-width: 10px; }
  .dot.g { background: var(--green); } .dot.r { background: var(--red); }
  .review-q { flex: 1; color: var(--text); } .review-ans { font-size: 12px; color: var(--muted); }
  #quiz-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<header>
  <div class="tag">Topic 2</div>
  <h1>Allocation of Resources</h1>
  <p class="subtitle">IGCSE Economics · Past Paper Questions</p>
</header>
<div id="quiz-container">
  <div class="progress-wrap">
    <div class="progress-info"><span id="q-counter">Question 1 of 7</span><span id="score-live">Score: 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="card" id="q-card">
    <div class="q-meta"><span class="q-num" id="q-label">Q1</span><span class="q-year" id="q-year"></span></div>
    <p class="q-text" id="q-text"></p>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="nav">
    <button class="btn btn-ghost" id="btn-prev" onclick="prevQ()">← Previous</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextQ()">Next →</button>
  </div>
</div>
<div class="score-screen" id="score-screen">
  <div class="score-circle"><div class="score-number" id="final-score">0</div><div class="score-total" id="final-total">/ 0</div></div>
  <h2 class="score-title" id="score-title"></h2>
  <p class="score-msg" id="score-msg"></p>
  <div class="review-list" id="review-list"></div>
  <button class="btn btn-primary" onclick="restart()">Try Again</button>
</div>
<script>
const TOPIC_NAME = "Allocation of Resources";
const questions = [
  {
    "year": "Oct/Nov 2025",
    "text": "The price of petrol increases in a country with a market economic system. What is a consequence of this?",
    "options": [
      "More cars are bought.",
      "The costs of road transport increase.",
      "The quantity of petrol supplied falls.",
      "There is a shortage of petrol."
    ],
    "answer": 1
  },
  {
    "year": "Oct/Nov 2025",
    "text": "What determines a consumer's demand for a product? Which combination is correct \u2014 price of the product, consumer's willingness to buy, and consumer's income all determine demand?",
    "options": [
      "All three: price, willingness, and income determine demand",
      "Price and willingness determine demand, but not income",
      "Willingness and income determine demand, but not price",
      "Price and income determine demand, but not willingness"
    ],
    "answer": 0
  },
  {
    "year": "Oct/Nov 2025",
    "text": "The diagram shows the market for a product with supply curve S and demand curve D. Points U, V, W, X mark distances between quantities at different prices. Which distance shows a market disequilibrium caused by excess supply?",
    "options": [
      "U to V",
      "U to X",
      "V to W",
      "X to W"
    ],
    "answer": 0
  },
  {
    "year": "Oct/Nov 2025",
    "text": "The price elasticity of demand (PED) of a good is \u20131. What will happen to both demand and total revenue as price increases?",
    "options": [
      "demand will fall and total revenue will not change",
      "demand will fall and total revenue will rise",
      "demand will rise and total revenue will not change",
      "demand will rise and total revenue will rise"
    ],
    "answer": 0
  },
  {
    "year": "Oct/Nov 2025",
    "text": "Which pair of economic institutions can be found in a market economy?",
    "options": [
      "charities and public sector firms",
      "multinational companies and commercial banks",
      "public sector firms and private sector firms",
      "stock exchanges and government-funded hospitals"
    ],
    "answer": 1
  },
  {
    "year": "Oct/Nov 2025",
    "text": "The table shows the weekly demand for, and supply of, good X at three prices ($20, $30, $40 per tonne). Supply is 10, 12, 14 tonnes; demand is 16, 12, 10 tonnes. What will be the effect if the government imposes a minimum price of $40 per tonne?",
    "options": [
      "a fall in the price of X",
      "a shortage of X",
      "a surplus of X",
      "no change in the market equilibrium"
    ],
    "answer": 2
  },
  {
    "year": "Oct/Nov 2025",
    "text": "What is the function of money when it is used to value goods and record transactions?",
    "options": [
      "a medium of exchange",
      "a standard of deferred payment",
      "a store of wealth",
      "a unit of account"
    ],
    "answer": 3
  }
];
let order = [...Array(questions.length).keys()].sort(() => Math.random() - 0.5);
let current = 0, score = 0;
let answered = new Array(questions.length).fill(null);
let selected = new Array(questions.length).fill(null);
function render() {
  const qi = order[current], q = questions[qi], total = questions.length;
  document.getElementById("q-counter").textContent = `Question ${current+1} of ${total}`;
  document.getElementById("score-live").textContent = `Score: ${score}`;
  document.getElementById("progress-fill").style.width = `${(current/total)*100}%`;
  document.getElementById("q-label").textContent = `Q${current+1}`;
  document.getElementById("q-year").textContent = q.year;
  document.getElementById("q-text").textContent = q.text;
  const optEl = document.getElementById("options");
  optEl.innerHTML = "";
  const letters = ["A","B","C","D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => choose(i);
    if (answered[current] !== null) {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add("correct");
      else if (i === selected[current]) btn.classList.add("wrong");
    }
    optEl.appendChild(btn);
  });
  const fb = document.getElementById("feedback");
  if (answered[current] !== null) {
    fb.className = "feedback show " + (answered[current] ? "correct-fb" : "wrong-fb");
    fb.textContent = answered[current] ? "✓ Correct! Well done." : `✗ The correct answer is ${letters[q.answer]}: ${q.options[q.answer]}`;
  } else { fb.className = "feedback"; fb.textContent = ""; }
  document.getElementById("btn-prev").style.visibility = current > 0 ? "visible" : "hidden";
  const isLast = current === total - 1;
  const btn = document.getElementById("btn-next");
  btn.textContent = isLast ? "See Results" : "Next →";
  btn.disabled = answered[current] === null;
}
function choose(i) {
  if (answered[current] !== null) return;
  const qi = order[current], q = questions[qi];
  selected[current] = i;
  const correct = i === q.answer;
  answered[current] = correct;
  if (correct) score++;
  render();
}
function nextQ() { if (current < questions.length-1) { current++; render(); } else showResults(); }
function prevQ() { if (current > 0) { current--; render(); } }
function showResults() {
  document.getElementById("quiz-container").style.display = "none";
  const ss = document.getElementById("score-screen");
  ss.classList.add("show");
  const total = questions.length;
  document.getElementById("final-score").textContent = score;
  document.getElementById("final-total").textContent = `/ ${total}`;
  const pct = Math.round((score/total)*100);
  document.getElementById("score-title").textContent = pct===100?"Perfect Score!":pct>=70?"Great Work!":pct>=40?"Keep Practising":"Keep Going!";
  document.getElementById("score-msg").textContent = `You scored ${score} out of ${total} (${pct}%) on ${TOPIC_NAME}.`;
  const rl = document.getElementById("review-list");
  rl.innerHTML = "";
  order.forEach((qi, idx) => {
    const q = questions[qi], letters = ["A","B","C","D"], correct = answered[idx] === true;
    const div = document.createElement("div");
    div.className = "review-item";
    div.innerHTML = `<div class="dot ${correct?"g":"r"}"></div><div class="review-q">${q.text.slice(0,80)}${q.text.length>80?"…":""}</div><div class="review-ans">Ans: ${letters[q.answer]}</div>`;
    rl.appendChild(div);
  });
}
function restart() {
  order = [...Array(questions.length).keys()].sort(()=>Math.random()-0.5);
  current=0; score=0;
  answered=new Array(questions.length).fill(null);
  selected=new Array(questions.length).fill(null);
  document.getElementById("quiz-container").style.display="flex";
  document.getElementById("score-screen").classList.remove("show");
  render();
}
render();
</script>
</body>
</html>
